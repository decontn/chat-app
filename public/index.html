<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Welcome Back</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- CHAT -->
  <div id="chatBox" style="display:none;">

    <!-- HEADER -->
    <div id="chatHeader">
      <span>D2K Chat</span>
      <button id="adminBtn" style="display:none;" onclick="toggleAdminPanel()">
        Admin Panel
      </button>
    </div>

    <!-- ADMIN -->
    <div id="adminPanel" style="display:none; padding:16px; background:#f8fafc; border-bottom:1px solid #e5e7eb;">
      <input id="newUsername" placeholder="New username">
      <input id="newPassword" placeholder="New password">
      <button onclick="addUser()">Add User</button>
    </div>

    <!-- MESSAGES -->
    <div id="messages"></div>

    <!-- CHAT INPUT -->
    <div class="chat-input-wrapper">

      <!-- TOOLBAR -->
      <div class="toolbar">
        <label for="fileInput">🖼️</label>
        <label for="fileInput">📎</label>
        <span>✂️</span>
        <span>⚡</span>
        <span>📝</span>
      </div>

      <!-- INPUT ROW -->
      <div class="input-row">
        <input type="file" id="fileInput" hidden onchange="uploadFile()">

        <input
          id="messageInput"
          type="text"
          placeholder="Nhập @, tin nhắn tới..."
          onkeypress="handleEnter(event)"
        >

        <span class="emoji-btn">😊</span>
        <button class="like-btn" onclick="sendLike()">👍</button>
      </div>

    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
