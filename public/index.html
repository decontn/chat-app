<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loginBox">
    <h2>Welcome Back</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="chatBox" style="display:none;">

    <div id="chatHeader">
    <div class="header-left">
        <img src="https://i.pravatar.cc/40" class="header-avatar">
        <span>D2K Chat</span>
    </div>

    <button id="adminBtn" style="display:none;" onclick="toggleAdminPanel()">
        Admin Panel
    </button>
</div>

    <div id="adminPanel" style="display:none;">
      <input id="newUsername" placeholder="New username">
      <input id="newPassword" placeholder="New password">
      <button onclick="addUser()">Add User</button>
    </div>

    <div id="messages"></div>

    <div class="chat-input-wrapper">

      <div class="toolbar">
        <button onclick="document.getElementById('fileInput').click()">🖼️</button>
        <button onclick="document.getElementById('fileInput').click()">📎</button>
        <button onclick="captureScreen()">✂️</button>
        <button>⚡</button>
        <button>📝</button>
      </div>

      <div class="input-row">
        <input type="file" id="fileInput" hidden onchange="uploadFile()">

        <input
          id="messageInput"
          type="text"
          placeholder="Nhập @, tin nhắn tới..."
          onkeypress="handleEnter(event)"
        >

        <span class="emoji-btn" onclick="insertEmoji()">😊</span>
        <button class="like-btn" onclick="sendLike()">👍</button>
      </div>

    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
