<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loginBox">
    <h2>Welcome Back</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="chatBox" style="display:none;">
    <div id="chatHeader">
      <span>Telegram Chat</span>
      <button id="adminBtn" style="display:none;" onclick="toggleAdminPanel()">Admin Panel</button>
    </div>

    <div id="adminPanel" style="display:none; padding:16px; background:#f8fafc; border-bottom:1px solid #e5e7eb;">
      <input id="newUsername" placeholder="New username">
      <input id="newPassword" placeholder="New password">
      <button onclick="addUser()">Add User</button>
    </div>
    <div id="messages"></div>

    <div id="bottomBar">
      <input id="messageInput" placeholder="Type a message...">
      <input type="file" id="fileInput">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
